<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Price & CCASS Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.0.1/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.2.0/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        h2 { margin: 0; color: #1a1a1a; font-size: 1.5rem; }
        .search-box { display: flex; gap: 10px; }
        input#stock-search { padding: 10px; border-radius: 6px; border: 1px solid #ccd0d5; width: 220px; }
        button#generate-btn { padding: 10px 20px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        .chart-section { height: 350px; width: 100%; margin-bottom: 30px; position: relative; }
        .section-label { font-size: 0.9rem; color: #65676b; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="display-title">Market Analysis Dashboard</h2>
        <div class="search-box">
            <input type="text" id="stock-search" list="stock-options" placeholder="Stock Code (e.g. 00001)" autocomplete="off">
            <datalist id="stock-options"></datalist>
            <button id="generate-btn">Analyze</button>
        </div>
    </div>

    <div class="section-label">Stock Price Trend (OHLC)</div>
    <div class="chart-section">
        <canvas id="priceChart"></canvas>
    </div>

    <div class="section-label">CCASS Broker Concentration (Stacked %)</div>
    <div class="chart-section">
        <canvas id="ccassChart"></canvas>
    </div>
</div>

<script>
let stocksIndex = {};
let priceChart, ccassChart;

// 1. Load Index
fetch('stocks_index.json')
    .then(r => r.json())
    .then(data => {
        stocksIndex = data;
        const dl = document.getElementById('stock-options');
        Object.keys(data).sort().forEach(code => {
            const opt = document.createElement('option');
            opt.value = code;
            opt.label = data[code].name;
            dl.appendChild(opt);
        });
    });

// 2. Control Logic
const searchInput = document.getElementById('stock-search');
const generateBtn = document.getElementById('generate-btn');

searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') generateBtn.click(); });

generateBtn.addEventListener('click', () => {
    let code = searchInput.value.trim();
    if (code.length > 0 && code.length < 5 && !isNaN(code)) {
        code = code.padStart(5, '0');
        searchInput.value = code;
    }
    if (stocksIndex[code]) loadAllData(code);
    else alert("Invalid Stock Code");
});

async function loadAllData(code) {
    document.getElementById('display-title').innerText = `${stocksIndex[code].name} (${code})`;
    
    // Check files in console
    console.log(`Fetching price: price_data/${code}.csv`);
    console.log(`Fetching CCASS: ccass_pivoted/${code}.csv`);

    const [priceRes, ccassRes] = await Promise.all([
        fetchCSV(`price_data/${code}.csv`),
        fetchCSV(`ccass_pivoted/${code}.csv`)
    ]);

    if (priceRes && priceRes.length > 0) {
        renderPriceChart(priceRes);
    } else {
        console.error("Price data is empty or missing.");
    }

    if (ccassRes && ccassRes.length > 0) {
        renderCCASSChart(ccassRes);
    }
}

function fetchCSV(url) {
    return new Promise((resolve) => {
        Papa.parse(url, {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => resolve(r.data),
            error: () => resolve(null)
        });
    });
}

function renderPriceChart(data) {
    const ctx = document.getElementById('priceChart').getContext('2d');
    
    // Critical: Ensure columns exist. Yahoo might capitalize them if the scraper failed.
    const ohlc = data.map(d => ({
        x: luxon.DateTime.fromISO(d.date || d.Date).valueOf(),
        o: d.open || d.Open,
        h: d.high || d.High,
        l: d.low || d.Low,
        c: d.close || d.Close
    })).filter(d => d.x && d.c); // Filter out rows where date/close is missing

    console.log("Processed OHLC Data:", ohlc);

    if (priceChart) priceChart.destroy();
    
    priceChart = new Chart(ctx, {
        type: 'candlestick',
        data: {
            datasets: [{
                label: 'Price',
                data: ohlc,
                color: { up: '#26a69a', down: '#ef5350', unchanged: '#999' },
                borderColor: { up: '#26a69a', down: '#ef5350', unchanged: '#999' }
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'day' },
                    grid: { display: false }
                },
                y: {
                    position: 'right',
                    grid: { color: '#f0f0f0' }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}

function renderCCASSChart(data) {
    const ctx = document.getElementById('ccassChart').getContext('2d');
    const labels = data.map(d => d.date);
    const brokers = Object.keys(data[0]).filter(k => k !== 'date');
    const colors = ['#36a2eb', '#ff6384', '#4bc0c0', '#ffcd56', '#9966ff', '#ff9f40', '#c9c9c9', '#5366ff', '#28a745', '#dc3545'];

    const datasets = brokers.map((b, i) => ({
        label: `${b} (${data[data.length-1][b].toFixed(2)}%)`,
        data: data.map(d => d[b]),
        backgroundColor: colors[i % colors.length] + 'b3',
        borderColor: colors[i % colors.length],
        fill: true,
        pointRadius: 0,
        borderWidth: 1,
        tension: 0.1
    }));

    if (ccassChart) ccassChart.destroy();
    ccassChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { grid: { display: false } },
                y: { 
                    stacked: true, 
                    ticks: { callback: v => v + '%' },
                    grid: { color: '#f0f0f0' }
                }
            },
            plugins: { 
                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                tooltip: { mode: 'index', intersect: false }
            }
        }
    });
}
</script>
</body>
</html>
