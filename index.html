<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock & CCASS Analysis Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.0.1/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.2.0/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background: #f4f7f9; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #edf2f7; }
        h2 { margin: 0; font-size: 1.5rem; color: #2d3748; }
        .search-area { display: flex; gap: 10px; }
        input#stock-search { padding: 10px 15px; border-radius: 6px; border: 1px solid #cbd5e0; width: 240px; font-size: 14px; }
        button#generate-btn { padding: 10px 20px; background: #3182ce; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        button#generate-btn:hover { background: #2b6cb0; }
        
        .chart-wrapper { position: relative; height: 350px; width: 100%; margin-bottom: 40px; }
        .label-tag { display: inline-block; background: #edf2f7; color: #4a5568; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="display-title">Market Analysis Dashboard</h2>
        <div class="search-area">
            <input type="text" id="stock-search" list="stock-options" placeholder="Stock Code (e.g. 00005)" autocomplete="off">
            <datalist id="stock-options"></datalist>
            <button id="generate-btn">Analyze</button>
        </div>
    </div>

    <div>
        <span class="label-tag">Price Action (OHLC)</span>
        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <div>
        <span class="label-tag">CCASS Concentration (Stacked Area)</span>
        <div class="chart-wrapper">
            <canvas id="ccassChart"></canvas>
        </div>
    </div>
</div>

<script>
let stocksIndex = {};
let priceChartInstance = null;
let ccassChartInstance = null;

// 1. Load the Stock Index for the search box
fetch('stocks_index.json')
    .then(r => r.json())
    .then(data => {
        stocksIndex = data;
        const dl = document.getElementById('stock-options');
        Object.keys(data).sort().forEach(code => {
            const opt = document.createElement('option');
            opt.value = code;
            opt.label = data[code].name;
            dl.appendChild(opt);
        });
    });

// 2. Event Listeners
const searchInput = document.getElementById('stock-search');
const btn = document.getElementById('generate-btn');

searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') btn.click(); });

btn.addEventListener('click', async () => {
    let code = searchInput.value.trim();
    if (code.length > 0 && code.length < 5 && !isNaN(code)) {
        code = code.padStart(5, '0');
        searchInput.value = code;
    }
    
    if (stocksIndex[code]) {
        await loadDashboard(code);
    } else {
        alert("Stock code not recognized.");
    }
});

// 3. Data Loading Engine
async function loadDashboard(code) {
    // FORCE DESTROY existing charts to prevent "Canvas in use" error
    const pCanvas = document.getElementById('priceChart');
    const cCanvas = document.getElementById('ccassChart');
    
    const oldP = Chart.getChart(pCanvas);
    if (oldP) oldP.destroy();
    
    const oldC = Chart.getChart(cCanvas);
    if (oldC) oldC.destroy();

    document.getElementById('display-title').innerText = `${stocksIndex[code].name} (${code})`;

    // Parallel fetch for speed
    const [priceData, ccassData] = await Promise.all([
        fetchCSV(`price_data/${code}.csv`),
        fetchCSV(`ccass_pivoted/${code}.csv`)
    ]);

    if (priceData && priceData.length > 0) renderPrice(priceData, pCanvas);
    if (ccassData && ccassData.length > 0) renderCCASS(ccassData, cCanvas);
}

function fetchCSV(url) {
    return new Promise(resolve => {
        Papa.parse(url, {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => resolve(r.data),
            error: () => resolve(null)
        });
    });
}

// 4. Rendering Functions
function renderPrice(data, canvas) {
    const ohlc = data.map(d => ({
        x: luxon.DateTime.fromISO(d.date || d.Date).valueOf(),
        o: d.open || d.Open,
        h: d.high || d.High,
        l: d.low || d.Low,
        c: d.close || d.Close
    })).filter(d => d.x && d.c);

    priceChartInstance = new Chart(canvas.getContext('2d'), {
        type: 'candlestick',
        data: {
            datasets: [{
                label: 'Price',
                data: ohlc,
                color: { up: '#26a69a', down: '#ef5350', unchanged: '#999' },
                borderColor: { up: '#26a69a', down: '#ef5350', unchanged: '#999' }
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { type: 'time', time: { unit: 'day' }, grid: { display: false } },
                y: { position: 'right', grid: { color: '#f0f0f0' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function renderCCASS(data, canvas) {
    const labels = data.map(d => d.date);
    const brokers = Object.keys(data[0]).filter(k => k !== 'date');
    const colors = ['#3182ce', '#e53e3e', '#38a169', '#dd6b20', '#805ad5', '#d69e2e', '#718096', '#319795', '#d53f8c', '#2c5282'];

    const datasets = brokers.map((b, i) => ({
        label: `${b} (${data[data.length-1][b].toFixed(2)}%)`,
        data: data.map(d => d[b]),
        backgroundColor: colors[i % colors.length] + 'cc', // 80% opacity
        borderColor: colors[i % colors.length],
        fill: true,
        pointRadius: 0,
        borderWidth: 1,
        tension: 0.1
    }));

    ccassChartInstance = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { grid: { display: false } },
                y: { 
                    stacked: true, 
                    beginAtZero: true,
                    ticks: { callback: v => v + '%' },
                    grid: { color: '#f0f0f0' }
                }
            },
            plugins: { 
                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                tooltip: { mode: 'index', intersect: false }
            }
        }
    });
}
</script>
</body>
</html>
