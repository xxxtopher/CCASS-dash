<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCASS Shareholding Analysis</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f8f9fa; }
        .controls { margin-bottom: 20px; padding: 15px; background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 8px; width: 250px; border: 1px solid #ccc; }
        button { padding: 8px 15px; background: #004481; color: white; border: none; cursor: pointer; }
        #chart { width: 100%; height: 700px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="controls">
    <input type="text" id="stockInput" placeholder="Enter Stock Code (e.g. 00005)">
    <button onclick="updateChart()">View Analysis</button>
</div>
<div id="chart"></div>

<script>
let shareReference = {};

// 1. Load the total shares reference first
Papa.parse("total_shares_reference.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        results.data.forEach(row => {
            if (row.StockCode) {
                // Ensure key is 5-digit string
                let code = row.StockCode.toString().padStart(5, '0');
                shareReference[code] = parseFloat(row.TotalShares);
            }
        });
        console.log("Total shares reference loaded.");
    }
});

function updateChart() {
    let code = document.getElementById('stockInput').value.trim().padStart(5, '0');
    let totalShares = shareReference[code];

    if (!totalShares) {
        console.warn("Total shares not found for this code. Displaying raw share counts.");
    }

    Papa.parse(`ccass_pivoted/${code}.csv`, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let csvData = results.data;
            let dates = csvData.map(r => r.date);
            let brokerNames = Object.keys(csvData[0]).filter(k => k !== 'date');

            let traces = brokerNames.map(name => {
                return {
                    x: dates,
                    y: csvData.map(r => {
                        let shares = parseFloat(r[name]) || 0;
                        // Return percentage if totalShares is known, else raw
                        return totalShares ? (shares / totalShares) * 100 : shares;
                    }),
                    name: name,
                    stackgroup: 'one',
                    mode: 'none'
                };
            });

            let layout = {
                title: `Top 10 Broker Concentration - Stock ${code}`,
                xaxis: { title: 'Date' },
                yaxis: { 
                    title: totalShares ? 'Percentage of Issued Shares (%)' : 'Number of Shares',
                    ticksuffix: totalShares ? '%' : ''
                },
                hovermode: 'x unified',
                legend: { orientation: 'h', y: -0.2 }
            };

            Plotly.newPlot('chart', traces, layout);
        },
        error: function() { alert("Could not find data for this stock code."); }
    });
}
</script>
</body>
</html>
