<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock & CCASS Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #f8fafc; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .search-area { display: flex; gap: 8px; }
        input#stock-search { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; width: 220px; outline: none; }
        button#generate-btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button#generate-btn:hover { background: #1d4ed8; }
        .chart-wrapper { height: 350px; margin-bottom: 40px; width: 100%; }
        .tag { font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="display-title">Market Analysis</h2>
        <div class="search-area">
            <input type="text" id="stock-search" list="stock-options" placeholder="Stock Code (e.g. 00001)">
            <datalist id="stock-options"></datalist>
            <button id="generate-btn">Generate</button>
        </div>
    </div>

    <span class="tag">Price Movement (OHLC)</span>
    <div class="chart-wrapper">
        <canvas id="priceChart"></canvas>
    </div>

    <span class="tag">Broker Holdings % (CCASS)</span>
    <div class="chart-wrapper">
        <canvas id="ccassChart"></canvas>
    </div>
</div>

<script>
    // Global variables to track chart instances
    let stocksIndex = {};
    let priceChartInstance = null;
    let ccassChartInstance = null;

    // 1. Initialize Dropdown
    async function init() {
        stocksIndex = await fetchJSON('stocks_index.json');
        if (!stocksIndex) {
            console.error("Failed to load stocks_index.json.");
            return;
        }

        const datalist = document.getElementById('stock-options');
        Object.keys(stocksIndex).forEach(code => {
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = stocksIndex[code].name;
            datalist.appendChild(opt);
        });
    }

    // 2. Load Button Listener
    document.getElementById('generate-btn').addEventListener('click', () => {
        const code = document.getElementById('stock-search').value.trim();
        if (stocksIndex[code]) {
            document.getElementById('display-title').textContent = stocksIndex[code].name + " (" + code + ")";
            renderDashboard(code);
        } else {
            alert("Please select a valid stock code from the list.");
        }
    });

    // 3. Main Rendering Function
    async function renderDashboard(code) {
        const priceData = await fetchCSV('price_data/' + code + '.csv');
        const ccassData = await fetchCSV('ccass_pivoted/' + code + '.csv');

        if (!priceData || !ccassData || ccassData.length === 0) {
            alert("Data not found for " + code + ". Check your folders.");
            return;
        }

        // Calculate Shared Date Range
        const priceDates = priceData.map(d => luxon.DateTime.fromISO(d.date).valueOf());
        const ccassDates = ccassData.map(d => luxon.DateTime.fromISO(d.date).valueOf());
        const minDate = Math.min(...priceDates, ...ccassDates);
        const maxDate = Math.max(...priceDates, ...ccassDates);

        if (priceChartInstance) priceChartInstance.destroy();
        if (ccassChartInstance) ccassChartInstance.destroy();

        const getXAxis = () => ({
            type: 'time',
            time: { unit: 'day' },
            min: minDate,
            max: maxDate,
            grid: { display: true, color: '#f1f5f9' },
            ticks: { source: 'auto' }
        });

        // 4. Render Price Chart
        priceChartInstance = new Chart('priceChart', {
            type: 'candlestick',
            data: {
                datasets: [{
                    label: 'Price',
                    data: priceData.map(d => ({
                        x: luxon.DateTime.fromISO(d.date).valueOf(),
                        // Round raw data to 2 decimals for consistency
                        o: Number(d.open.toFixed(2)), 
                        h: Number(d.high.toFixed(2)), 
                        l: Number(d.low.toFixed(2)), 
                        c: Number(d.close.toFixed(2))
                    }))
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                onHover: (e) => syncCharts(e, ccassChartInstance),
                scales: { 
                    x: getXAxis(), 
                    y: { 
                        position: 'right', 
                        afterFit: (axis) => { axis.width = 70 },
                        ticks: {
                            // Forces the Y-axis labels to 2 decimal places
                            callback: (value) => value.toFixed(2)
                        }
                    } 
                },
                plugins: { 
                    tooltip: { 
                        mode: 'index', 
                        intersect: false,
                        callbacks: {
                            // Custom tooltip label to format OHLC values
                            label: function(context) {
                                const p = context.raw;
                                return [
                                    `Open:  ${p.o.toFixed(2)}`,
                                    `High:  ${p.h.toFixed(2)}`,
                                    `Low:   ${p.l.toFixed(2)}`,
                                    `Close: ${p.c.toFixed(2)}`
                                ];
                            }
                        }
                    } 
                }
            }
        });

        // 5. Render CCASS Chart
        const brokers = Object.keys(ccassData[0]).filter(k => k !== 'date' && k !== 'TOTAL_CCASS_PCT');
        const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#64748b', '#06b6d4', '#f97316', '#1e40af'];

        ccassChartInstance = new Chart('ccassChart', {
            type: 'line',
            data: {
                datasets: brokers.map((b, i) => ({
                    label: b,
                    data: ccassData.map(d => ({
                        x: luxon.DateTime.fromISO(d.date).valueOf(),
                        y: d[b]
                    })),
                    backgroundColor: colors[i % colors.length] + 'aa',
                    borderColor: colors[i % colors.length],
                    fill: true, pointRadius: 0, borderWidth: 1
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                onHover: (e) => syncCharts(e, priceChartInstance),
                scales: { 
                    x: getXAxis(), 
                    y: { 
                        stacked: true, position: 'right',
                        afterFit: (axis) => { axis.width = 70 },
                        ticks: { callback: v => v + '%' } 
                    } 
                },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } },
                    tooltip: {
                        mode: 'index', intersect: false,
                        callbacks: {
                            beforeTitle: function(context) {
                                const total = ccassData[context[0].dataIndex].TOTAL_CCASS_PCT;
                                return total ? `TOTAL CCASS: ${total.toFixed(2)}%` : "";
                            }
                        }
                    }
                }
            }
        });
    }

    // --- Helpers ---

    function syncCharts(chartEvent, targetChart) {
        if (!targetChart || !chartEvent.native) return;
        
        // Find the points on the target chart that match the mouse X position
        const points = targetChart.getElementsAtEventForMode(chartEvent.native, 'index', { intersect: false }, true);
        
        if (points.length > 0) {
            targetChart.setActiveElements(points);
            // We pass the mouse coordinates so the tooltip follows the cursor
            targetChart.tooltip.setActiveElements(points, { x: chartEvent.x, y: chartEvent.y });
        } else {
            targetChart.setActiveElements([]);
            targetChart.tooltip.setActiveElements([]);
        }
        targetChart.update('none');
    }

    function fetchCSV(url) {
        return new Promise(resolve => {
            Papa.parse(url, {
                download: true,
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: r => resolve(r.data),
                error: () => resolve(null)
            });
        });
    }

    async function fetchJSON(url) {
        try {
            const r = await fetch(url);
            return await r.json();
        } catch (e) {
            console.error("JSON Error:", e);
            return null;
        }
    }

    init();
</script>
</body>
</html>
