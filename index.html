<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEC Finance | CCASS Whale Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .search-box { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; }
        button { padding: 12px 24px; border-radius: 8px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-item { background: #334155; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .stat-label { display: block; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }
        #chart-wrapper { background: var(--card); padding: 20px; border-radius: 12px; height: 600px; position: relative; border: 1px solid #334155; }
        .loader { color: var(--accent); font-style: italic; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">Institutional Ownership Dashboard</h2>
        <p style="color: #94a3b8; margin: 5px 0 0 0;">Tracking Strategic vs. Broker Float via CCASS Records</p>
        
        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="Enter Ticker (e.g. 700, 5, 2497) or Company Name...">
            <button onclick="searchStock()">Analyze Records</button>
        </div>
        <div id="loadingStatus" class="loader">Processing CSV data...</div>

        <div id="metaInfo" class="stats" style="display: none;">
            <div class="stat-item">
                <span class="stat-label">Entity Name</span>
                <span id="sName" class="stat-value">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Shares Outstanding</span>
                <span id="sTotal" class="stat-value">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ticker / Issue ID</span>
                <span id="sIDs" class="stat-value">-</span>
            </div>
        </div>
    </div>

    <div id="chart-wrapper">
        <canvas id="ownershipChart"></canvas>
    </div>
</div>

<script>
    let stocksIndex = {};
    let participants = {};
    let chart = null;

    // Load necessary mapping files
    async function init() {
        try {
            const [sRes, pRes] = await Promise.all([
                fetch('stocks_index.json'),
                fetch('participants.json')
            ]);
            stocksIndex = await sRes.json();
            participants = await pRes.json();
            console.log("Mapping indices initialized.");
        } catch (e) {
            console.error("Initialization failed. Check if JSON files are in the root folder.", e);
        }
    }

    init();

    async function searchStock() {
        const query = document.getElementById('tickerInput').value.trim();
        if (!query) return;

        let foundId = null;
        let stockData = null;

        // Search Logic: Ticker Match -> Name Match -> IssueID Match
        for (let id in stocksIndex) {
            const s = stocksIndex[id];
            // Match ticker (exact string) or Name (partial) or ID (exact)
            if (s.ticker === query || 
                (s.name && s.name.toLowerCase().includes(query.toLowerCase())) || 
                id === query) {
                foundId = id;
                stockData = s;
                break;
            }
        }

        if (foundId) {
            document.getElementById('loadingStatus').style.display = 'block';
            document.getElementById('metaInfo').style.display = 'grid';
            document.getElementById('sName').innerText = stockData.name;
            document.getElementById('sTotal').innerText = stockData.total ? stockData.total.toLocaleString() : "Data Pending";
            document.getElementById('sIDs').innerText = `Ticker: ${stockData.ticker || 'N/A'} | ID: ${foundId}`;
            
            // Load the CSV using the found IssueID
            fetchCcassData(foundId, stockData.total || 500000000);
        } else {
            alert("Stock not found. Try the numeric ticker (e.g., '700' for Tencent).");
        }
    }

    function fetchCcassData(issueId, totalShares) {
        // Path matches your GitHub folder structure
        const csvPath = `ccass_data/${issueId}.csv`;
        
        Papa.parse(csvPath, {
            download: true,
            skipEmptyLines: true,
            complete: (results) => {
                document.getElementById('loadingStatus').style.display = 'none';
                processAndRender(results.data, totalShares);
            },
            error: (err) => {
                document.getElementById('loadingStatus').style.display = 'none';
                alert(`CSV not found for Issue ID ${issueId}. Ensure ccass_data/${issueId}.csv is uploaded.`);
            }
        });
    }

    function processAndRender(csvData, totalShares) {
        const dataMap = {};
        const allBrokers = new Set();

        // 1. Group raw data by date
        csvData.forEach(row => {
            if (row.length < 3) return;
            const [date, pid, shares] = row;
            if (!dataMap[date]) dataMap[date] = {};
            
            const brokerName = participants[pid]?.n || `PID: ${pid}`;
            dataMap[date][brokerName] = parseInt(shares);
            allBrokers.add(brokerName);
        });

        const sortedDates = Object.keys(dataMap).sort();
        const brokerList = Array.from(allBrokers);
        
        // 2. Carry-Forward & Percentage Calculation
        let currentHoldings = {};
        brokerList.forEach(b => currentHoldings[b] = 0);

        const finalizedDatasets = {
            'Strategic Holdings': []
        };
        brokerList.forEach(b => finalizedDatasets[b] = []);

        sortedDates.forEach(date => {
            // Update current state with today's changes
            Object.assign(currentHoldings, dataMap[date]);
            
            let ccassTotalPercent = 0;
            for (let b in currentHoldings) {
                const p = (currentHoldings[b] / totalShares) * 100;
                finalizedDatasets[b].push(p);
                ccassTotalPercent += p;
            }
            // Strategic layer is whatever isn't in CCASS
            finalizedDatasets['Strategic Holdings'].push(Math.max(0, 100 - ccassTotalPercent));
        });

        renderChart(sortedDates, finalizedDatasets);
    }

    function renderChart(dates, datasets) {
        const ctx = document.getElementById('ownershipChart').getContext('2d');
        if (chart) chart.destroy();

        // Filter for top 15 brokers to keep the legend clean
        const lastDateIdx = dates.length - 1;
        const topBrokers = Object.keys(datasets)
            .filter(k => k !== 'Strategic Holdings')
            .sort((a, b) => datasets[b][lastDateIdx] - datasets[a][lastDateIdx])
            .slice(0, 15);

        const chartDatasets = [
            {
                label: 'Strategic / Physical Certificates',
                data: datasets['Strategic Holdings'],
                backgroundColor: 'rgba(71, 85, 105, 0.5)', // Slate/Gray
                fill: true, borderWidth: 0, pointRadius: 0
            },
            ...topBrokers.map((name, i) => ({
                label: name,
                data: datasets[name],
                backgroundColor: `hsla(${i * 25}, 70%, 60%, 0.8)`,
                fill: true, borderWidth: 1, pointRadius: 0
            }))
        ];

        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: dates, datasets: chartDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { stacked: true, max: 100, ticks: { callback: v => v + '%' } },
                    x: { stacked: true, ticks: { maxRotation: 45, minRotation: 45 } }
                },
                plugins: {
                    tooltip: { mode: 'index', intersect: false },
                    legend: { position: 'right', labels: { color: '#f8fafc', boxWidth: 12, font: { size: 10 } } }
                }
            }
        });
    }
</script>
</body>
</html>
